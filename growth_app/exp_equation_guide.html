<h5><strong>Equation Guide</strong></h5>
<ul>
  <li>\(N\) is the population size at a given time-step (\(t\))</li>
  <li>\(r_d\) is the discrete growth rate
    <ul>
      <li>\(r > 0\): positive growth</li>
      <li>\(r = 0\): no change</li>
      <li>\(r < 0\): population decline</li>
    </ul>
  </li>
</ul>
