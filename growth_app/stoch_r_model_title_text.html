<div>
<h2>Stochastic discrete population growth model:</h2>
<p><span class="math inline">\(N_{t+1} = N_t + r_dN_t\left(1- \frac{N_t}{K} \right)\)</span>, where <span class="math inline">\(r_d \sim \mathcal{N}(\mu, \sigma^2)\)</span></p>
</div>
